layer:
  id: "os_river_name"
  description: |
    Simplified centerlines from OS Open Rivers for placing labels along rivers.
  buffer_size: 64
  fields:
    name: The name of the river
    length: "The length of this centerline (TODO: removeme)"
  datasource:
    geometry_field: geometry
    query: (SELECT geometry, name, length FROM layer_os_river_name(!bbox!, z(!scale_denominator!))) as t
schema:
  - ./os_river_name.sql
